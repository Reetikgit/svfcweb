<script type="text/javascript">
	var auth=window.localStorage.getItem('user');
	setInterval(function(){
	 
	  if(auth!=undefined||auth!=null){
	    
	    window.location="index.html"
	  }
	},100)
	var firebaseConfig = {
	    apiKey: "AIzaSyBGnkLNGCt53P_TmBsfezid52nTYVIdFvU",
	    authDomain: "svfcweb.firebaseapp.com",
	    databaseURL: "https://svfcweb.firebaseio.com",
	    projectId: "svfcweb",
	    storageBucket: "svfcweb.appspot.com",
	    messagingSenderId: "999855456006",
	    appId: "1:999855456006:web:c12afd817a3ee49672a887"
	  };
	  // Initialize Firebase
	  firebase.initializeApp(firebaseConfig);
	// Initialize Firebase
	let ref= firebase.database().ref('User');
	ref.on('value',gotData,errData)
	log.addEventListener('click',logind)
	var sc,keys;
	function gotData(data){

		sc=data.val();
		keys=Object.keys(sc);
		
	}
	function logind(){
		var email=document.querySelector('#email').value
		var pass=document.querySelector('#password').value
		var c=0;
		var k;
		if(email!=""||pass!=""){
			for(var i=0;i<keys.length;i++){
				k=keys[i]
				if(sc[k].Email==email&&sc[k].Password==btoa(pass)){
					c++;
					break;

				}
			}
			if(c==1){

				token=btoa(k+"email")
				firebase.database().ref("User").child(k).update({token})
				window.localStorage.setItem('session', token);
				window.localStorage.setItem('user', k);
				window.localStorage.setItem('username', sc[k].Name);


				window.location="index.html"
			}else{
				alert("Invalid Email Id or password")
			}
		}else{
			alert("Please enter your email and password")
		}


	}
	function errData(){

	}
</script>
